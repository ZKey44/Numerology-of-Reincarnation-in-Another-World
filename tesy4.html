<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>異世界転生数秘術</title>

<style>
body {
  font-family: sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
  color: white;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 22px;
}

input, button {
  padding: 12px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  margin: 10px;
}

button {
  background: #ffcc00;
  color: black;
  font-weight: bold;
}

.result {
  margin-top: 15px;
  padding: 15px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
}

/* グリッド（軸込み） */
#grid {
  margin-top: 20px;
  display: grid;
  grid-template-columns: 30px repeat(11, 28px);
  gap: 3px;
  justify-content: center;
}

.cell {
  width: 28px;
  height: 28px;
  font-size: 10px;
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  transition: all 0.2s;
}

.axis {
  font-size: 12px;
  color: #ccc;
  display: flex;
  align-items: center;
  justify-content: center;
}

.active {
  background: gold;
  color: black;
  transform: scale(1.2);
  box-shadow: 0 0 10px gold;
}

.start {
  background: #ff4444;
}
</style>
</head>

<body>

<h1>異世界転生数秘術</h1>

<input type="date" id="birthdate">
<br>
<button onclick="run()">占う</button>

<div class="result" id="result"></div>
<div id="grid"></div>

<script>

// ===== グリッド定義 =====
const gridData = [
  [94,40,85,31,76,22,67,13,58,4,49],
  [39,84,30,75,21,66,12,57,3,48,93],
  [83,29,74,20,65,11,56,2,47,92,38],
  [28,73,19,64,10,55,1,46,91,37,82],
  [72,18,63,9,54,99,45,90,36,81,27],
  [17,62,8,53,98,44,89,35,80,26,71],
  [61,7,52,97,43,88,34,79,25,70,16],
  [6,51,96,42,87,33,78,24,69,15,60],
  [50,95,41,86,32,77,23,68,14,59,5]
];

// ===== 軸 =====
const verticalAxis = [4,3,2,1,9,8,7,6,5];
const horizontalAxis = [6,7,8,9,10,11,1,2,3,4,5];

// ===== mod補正 =====
function modFix(value, modBase) {
  const result = value % modBase;
  return result === 0 ? modBase : result;
}

// ===== 占い計算 =====
function calculateFortune() {
  const input = document.getElementById("birthdate").value;
  if (!input) {
    alert("生年月日を入力してください");
    return null;
  }

  const [year, month, day] = input.split("-").map(Number);
  const total = year + month + day;

  return {
    total: total,
    vertical: modFix(total, 9),
    horizontal: modFix(total, 11),
    cross: modFix(total, 99)
  };
}

// ===== 生年月日 → 桁 =====
function getBirthDigits() {
  const input = document.getElementById("birthdate").value;
  if (!input) return null;

  return input.replaceAll("-", "").split("").reverse().map(Number);
}

// ===== 位置取得 =====
function getPositionFromCross(cross) {
  for (let y = 0; y < gridData.length; y++) {
    for (let x = 0; x < gridData[y].length; x++) {
      if (gridData[y][x] === cross) {
        return { x, y };
      }
    }
  }
  return null;
}

// ===== ジグザグ移動 =====
function moveZigzag(start, digits) {
  let path = [];
  let x = start.x;
  let y = start.y;

  const width = 11;
  const height = 9;

  path.push({x, y});

  digits.forEach((num, index) => {
    for (let i = 0; i < num; i++) {

      if (index % 2 === 0) {
        x = (x + 1) % width;
        y = (y - 1 + height) % height;
      } else {
        x = (x - 1 + width) % width;
        y = (y - 1 + height) % height;
      }

      path.push({x, y});
    }
  });

  return path;
}

// ===== グリッド描画 =====
function createGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  // 左上空白
  grid.appendChild(document.createElement("div"));

  // 横軸
  horizontalAxis.forEach(n => {
    const c = document.createElement("div");
    c.className = "axis";
    c.textContent = n;
    grid.appendChild(c);
  });

  for (let y = 0; y < gridData.length; y++) {

    // 縦軸
    const v = document.createElement("div");
    v.className = "axis";
    v.textContent = verticalAxis[y];
    grid.appendChild(v);

    for (let x = 0; x < gridData[y].length; x++) {
      const num = gridData[y][x];

      const cell = document.createElement("div");
      cell.className = "cell";
      cell.textContent = num.toString().padStart(2, "0");

      if (num === 99) {
        cell.classList.add("start");
      }

      grid.appendChild(cell);
    }
  }
}

// ===== アニメーション =====
function animatePath(path) {
  const cells = document.querySelectorAll(".cell");

  cells.forEach(c => c.classList.remove("active"));

  path.forEach((pos, i) => {
    setTimeout(() => {
      const index = pos.y * 11 + pos.x;
      if (cells[index]) {
        cells[index].classList.add("active");
      }
    }, i * 100);
  });
}

// ===== 実行 =====
function run() {
  const data = calculateFortune();
  if (!data) return;

  const digits = getBirthDigits();
  if (!digits) return;

  const start = getPositionFromCross(99);

  const path = moveZigzag(start, digits);
  const final = path[path.length - 1];
  const finalNumber = gridData[final.y][final.x];

  document.getElementById("result").innerHTML = `
    生年月日: ${digits.slice().reverse().join("")}<br><br>
    ヴァーチカル: ${data.vertical}<br>
    ホリゾンタル: ${data.horizontal}<br>
    クロス: ${data.cross}<br><br>
    到達マス: ${finalNumber}
  `;

  createGrid();
  animatePath(path);
}

// 初期描画
createGrid();

</script>

</body>
</html>
