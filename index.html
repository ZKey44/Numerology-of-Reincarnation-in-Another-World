<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 20px;
}

button {
  padding: 10px;
  font-size: 16px;
}

.result {
  margin-top: 20px;
  font-size: 18px;
  line-height: 1.8;
}
</style>
</head>

<body>

<h2>異世界転生数秘術</h2>

<input type="date" id="birthdate">
<br>
<button onclick="run()">占う</button>

<div class="result" id="result"></div>

<script>
// mod計算（0→最大値に変換）
function modFix(value, modBase) {
  const result = value % modBase;
  return result === 0 ? modBase : result;
}

function calculateFortune() {
  const input = document.getElementById("birthdate").value;

  if (!input) {
    alert("生年月日を入力してください");
    return null;
  }

  const [year, month, day] = input.split("-").map(Number);

  const total = year + month + day;

  return {
    total: total,
    vertical: modFix(total, 9),   // ヴァーチカル
    horizontal: modFix(total, 11),// ホリゾンタル
    cross: modFix(total, 99)      // クロス
  };
}

function run() {
  const data = calculateFortune();
  if (!data) return;

  document.getElementById("result").innerHTML = `
    合計値: ${data.total}<br><br>
    ヴァーチカルナンバー: ${data.vertical}<br>
    ホリゾンタルナンバー: ${data.horizontal}<br>
    クロスナンバー: ${data.cross}
  `;
}
</script>

</body>
</html>
