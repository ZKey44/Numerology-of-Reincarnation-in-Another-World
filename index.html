<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:type" content="website">
<meta property="og:title" content="異世界転生数秘術">
<meta property="og:description" content="もう一人のあなたを導く、存在しない数秘術">
<meta property="og:url" content="https://zkey44.github.io/numerology/?v=1">
<meta property="og:image" content="https://zkey44.github.io/numerology/ogp-v1.png">
<meta property="og:image:width" content="1200">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="異世界転生数秘術">
<meta name="twitter:description" content="もう一人のあなたを導く、存在しない数秘術">
<meta name="twitter:image" content="https://zkey44.github.io/numerology/ogp-v1.png">

<title>異世界転生数秘術</title>

<style>
html {
  background: #1e1e2f;
}

@keyframes bgMove {
  0% { background-position: center, 0% 50%; }
  50% { background-position: center, 100% 50%; }
  100% { background-position: center, 0% 50%; }
}

body {
  font-family: sans-serif;
  background:
    radial-gradient(circle at 50% 30%, rgba(204,102,255,0.15), transparent 60%),
    linear-gradient(135deg, #1e1e2f, #3a3a6a);

  color: white;
  text-align: center;
  min-height: 100dvh;
  padding: 20px;

  box-sizing: border-box;

  background-size: 100% 100%, 200% 200%;
  background-position: center, 0% 50%;

  animation: bgMove 20s linear infinite;

  /* ★追加 */
  transform: translateZ(0);
  will-change: background-position;
}

/* ===== リード文 ===== */
#lead {
  margin-top: 15px;
  margin-bottom: 20px;
  font-size: 14px;
  line-height: 1.8;
  color: #ddd;
  letter-spacing: 0.05em;
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ===== 入力UI ===== */
#form-area {
  margin-top: 10px;
  margin-bottom: 10px;
}

button {
  margin-left: 8px;
  padding: 8px 14px;
  border-radius: 6px;
  border: none;
  background: linear-gradient(135deg, #cc66ff, #8844ff);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.2s ease;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px #cc66ff;
}

#toggleBtn {
  margin-top: 10px;
  font-size: 12px;
  background: transparent;
  border: 1px solid #666;
}

#toggleBtn:hover {
  background: rgba(255,255,255,0.1);
}

/* ===== グリッド ===== */
#grid {
  margin: 20px auto 0;
  display: grid;
  grid-template-columns: repeat(13, 1fr);
  gap: 2px;
  width: 100%;
  max-width: 520px;
}

.cell, .axis {
  aspect-ratio: 1 / 1;
  width: 100%;
  font-size: clamp(10px, 2.5vw, 14px);
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  transition: all 0.3s ease;
  box-sizing: border-box;
}

.cell { background: #222; }
.axis { background: #222; color: #aaa; }

.start { background: #ff4444; }

.passed {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
}

.current {
  background: #cc66ff;
  color: white;
  transform: scale(1.15);
  position: relative;
  z-index: 2;
}

.axis-current {
  background: #cc66ff;
  color: white;
}

.final-cross {
  background: gold;
  color: black;
}

.final-vertical {
  background: #3399ff;
  color: white;
  font-weight: bold;
}

.final-horizontal {
  background: #33cc66;
  color: white;
  font-weight: bold;
}

#result.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}

#result {
  margin-top: 40px;

  scroll-margin-top: 20px;

  min-height: 140px; /* ★追加（重要） */
  opacity: 0;
  transform: translateY(10px) scale(0.98);
  transition: opacity 0.6s, transform 0.6s;
  line-height: 1.8;
}

#shareBtn {
  margin-top: 20px;
  margin-bottom: 30px;
  display: none;
}

/* ★追加：Discordボタン */
#discordBtn {
  margin-top: 10px;
  display: none;
  background: #5865F2;
}

#discordInfo {
  margin-top: 20px;
  font-size: 13px;
  color: #ccc;
  line-height: 1.6;
}
</style>
</head>

<body>

<h2>異世界転生数秘術</h2>

<!-- ★追加リード文 -->
<div id="lead">
  生年月日をもとに、<br>
  あなたと同じ性質を持つ<br>
  “もう一人のあなた”を<br>
  異世界へと転生させます。<br><br>
  これは、“もう一人のあなた”を導く、<br>
  存在しない数秘術――
</div>

<div id="form-area">
  <input type="date" id="birthdate">
  <button onclick="run()">占う</button>
</div>

<button id="toggleBtn" onclick="toggleForm()">入力欄を隠す</button>

<div id="grid"></div>
<div id="result"></div>
<button id="shareBtn" onclick="shareResult()">Xに投稿</button>

<div id="discordInfo" style="display:none;">
  この占いの詳細な鑑定結果は<br>
  Discordサーバーで公開しています
</div>

<!-- ★追加：Discordボタン -->
<button id="discordBtn" onclick="openDiscord()">Discordに参加</button>

<script>

// ===== フォーム切替 =====
function toggleForm(){
  const form = document.getElementById("form-area");
  const btn = document.getElementById("toggleBtn");

  if(form.style.display === "none"){
    form.style.display = "block";
    btn.textContent = "入力欄を隠す";
  }else{
    form.style.display = "none";
    btn.textContent = "入力欄を表示";
  }
}

// ===== データ =====
const gridData = [
  [94,40,85,31,76,22,67,13,58,4,49],
  [39,84,30,75,21,66,12,57,3,48,93],
  [83,29,74,20,65,11,56,2,47,92,38],
  [28,73,19,64,10,55,1,46,91,37,82],
  [72,18,63,9,54,99,45,90,36,81,27],
  [17,62,8,53,98,44,89,35,80,26,71],
  [61,7,52,97,43,88,34,79,25,70,16],
  [6,51,96,42,87,33,78,24,69,15,60],
  [50,95,41,86,32,77,23,68,14,59,5]
];

const verticalAxis = [4,3,2,1,9,8,7,6,5];
const horizontalAxis = [6,7,8,9,10,11,1,2,3,4,5];

const verticalMap = {1:"戦士",2:"僧侶",3:"盗賊",4:"騎士",5:"忍者",6:"狩人",7:"魔術師",8:"侍",9:"放浪者"};

const horizontalMap = {
  1:"白き天空の領域ケテル",2:"知恵と創造の領域コクマー",3:"黒き凍土の領域ビナー",
  4:"慈悲と豊穣の領域ケセド",5:"赤き焦土の領域ゲブラー",6:"美と調和の領域ティファレト",
  7:"翠き砂海の領域ネツァク",8:"栄光と交易の領域ホド",9:"深き湖畔の領域イェソド",
  10:"王国と繁栄の領域マルクト",11:"知識と深淵の領域ダアト"
};

// ===== 投稿文生成（追加） =====
function buildShareText(data){

  const shortName = horizontalMap[data.horizontal].replace(/^.*領域/, "");

  return `もう一人のあなたの転生結果は…

【${shortName}の${verticalMap[data.vertical]}】

・ヴァーチカルナンバー${data.vertical}
「${verticalMap[data.vertical]}」の才を宿す

・ホリゾンタルナンバー${data.horizontal}
「${horizontalMap[data.horizontal]}」に導かれる

そして――
クロスナンバー${data.cross}の力が目覚める

#異世界転生数秘術

https://zkey44.github.io/numerology/`;
}

// ===== 計算 =====
function modFix(v,m){ return v%m===0?m:v%m; }

function calculateFortune(){
  const input=document.getElementById("birthdate").value;
  if(!input) return null;

  const [y,m,d]=input.split("-").map(Number);
  const total=y+m+d;

  return {
    vertical:modFix(total,9),
    horizontal:modFix(total,11),
    cross:modFix(total,99)
  };
}

function getDigits(){
  return document.getElementById("birthdate").value.replaceAll("-","").split("").reverse().map(Number);
}

function findPos(n){
  for(let y=0;y<9;y++){
    for(let x=0;x<11;x++){
      if(gridData[y][x]===n) return {x,y};
    }
  }
}

function move(start,digits){
  let path=[], x=start.x,y=start.y;
  path.push({x,y});
  digits.forEach((num,i)=>{
    for(let j=0;j<num;j++){
      if(i%2===0){ x=(x+1)%11; y=(y-1+9)%9; }
      else{ x=(x-1+11)%11; y=(y-1+9)%9; }
      path.push({x,y});
    }
  });
  return path;
}

// ===== 描画 =====
function createGrid(path, final, vNum, hNum, currentPos){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  let currentV = currentPos ? verticalAxis[currentPos.y] : null;
  let currentH = currentPos ? horizontalAxis[currentPos.x] : null;

  grid.appendChild(document.createElement("div"));
  horizontalAxis.forEach(n=>{
    let d=document.createElement("div");
    d.className="axis";
    if(currentPos && n===currentH) d.classList.add("axis-current");
    else if(final && n===hNum) d.classList.add("final-horizontal");
    d.textContent=n;
    grid.appendChild(d);
  });
  grid.appendChild(document.createElement("div"));

  for(let y=0;y<9;y++){
    let l=document.createElement("div");
    l.className="axis";
    if(currentPos && verticalAxis[y]===currentV) l.classList.add("axis-current");
    else if(final && verticalAxis[y]===vNum) l.classList.add("final-vertical");
    l.textContent=verticalAxis[y];
    grid.appendChild(l);

    for(let x=0;x<11;x++){
      let num=gridData[y][x];
      let cell=document.createElement("div");
      cell.className="cell";
      cell.textContent=num.toString().padStart(2,"0");

      if(path.some(p=>p.x===x && p.y===y)) cell.classList.add("passed");
      if(num===99 && !currentPos) cell.classList.add("start");
      if(final && final.x===x && final.y===y) cell.classList.add("final-cross");
      if(currentPos && currentPos.x===x && currentPos.y===y) cell.classList.add("current");

      grid.appendChild(cell);
    }

    let r=document.createElement("div");
    r.className="axis";
    if(currentPos && verticalAxis[y]===currentV) r.classList.add("axis-current");
    else if(final && verticalAxis[y]===vNum) r.classList.add("final-vertical");
    r.textContent=verticalAxis[y];
    grid.appendChild(r);
  }

  grid.appendChild(document.createElement("div"));
  horizontalAxis.forEach(n=>{
    let d=document.createElement("div");
    d.className="axis";
    if(currentPos && n===currentH) d.classList.add("axis-current");
    else if(final && n===hNum) d.classList.add("final-horizontal");
    d.textContent=n;
    grid.appendChild(d);
  });
  grid.appendChild(document.createElement("div"));
}

// ===== アニメ =====
function animate(path, final, vNum, hNum, onComplete){
  let step=0;
  function loop(){
    if(step>=path.length){
      createGrid(path, null, vNum, hNum, final);
      setTimeout(()=>{
        createGrid(path, final, vNum, hNum);
        setTimeout(onComplete,300);
      },300);
      return;
    }
    createGrid(path.slice(0,step+1), null, vNum, hNum, path[step]);
    step++;
    setTimeout(loop,120);
  }
  loop();
}

// ===== 実行 =====
let lastResultText = "";

function run(){
  const data=calculateFortune();
  if(!data) return;

  const resultEl = document.getElementById("result");
  resultEl.classList.remove("show");

  const path=move(findPos(99), getDigits());
  const final=path[path.length-1];

  animate(path, final, data.vertical, data.horizontal, ()=>{
  const text =
`ヴァーチカルナンバー${data.vertical}の加護により、
「${verticalMap[data.vertical]}」の才を宿す

ホリゾンタルナンバー${data.horizontal}の導きにより、
「${horizontalMap[data.horizontal]}」に降り立つ

そして――
クロスナンバー${data.cross}の力が目覚める`;

// ① 中身入れる
resultEl.innerHTML = text.replace(/\n/g,"<br>");

// ② ページを伸ばす
document.body.style.paddingBottom = window.innerHeight + "px";

// ③ フレーム待ち（レイアウト確定）
requestAnimationFrame(()=>{
  requestAnimationFrame(()=>{

    // ←ここで座標取得（重要）
    const y = resultEl.getBoundingClientRect().top + window.pageYOffset;

    window.scrollTo({
      top: y,
      behavior: "smooth"
    });

    // ④ 表示
    setTimeout(()=>{
      resultEl.classList.add("show");
      
      document.body.style.paddingBottom = "";
    }, 300);

  });
});

  lastResultText = buildShareText(data);

  document.getElementById("shareBtn").style.display = "inline-block";
  document.getElementById("discordInfo").style.display = "block";
  document.getElementById("discordBtn").style.display = "inline-block";
});
}

// ===== X共有 =====
function shareResult(){
  const text = encodeURIComponent(lastResultText);
  window.open("https://twitter.com/intent/tweet?text=" + text, "_blank");
}

// ★追加
function openDiscord(){
  window.open("https://discord.gg/SEyaRxq9yu", "_blank");
}

// 初期表示
const startPos = findPos(99);
createGrid([], null, 9, 11, startPos);

</script>

</body>
</html>
