<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>異世界転生数秘術</title>

<style>
body {
  font-family: sans-serif;
  background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
  color: white;
  text-align: center;
  padding: 20px;
}

/* グリッド */
#grid {
  margin-top: 20px;
  display: grid;
  grid-template-columns: 30px repeat(11, 28px) 30px;
  gap: 3px;
  justify-content: center;
}

.cell {
  width: 28px;
  height: 28px;
  font-size: 10px;
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  transition: all 0.15s;
}

/* 軸 */
.axis {
  font-size: 12px;
  color: #aaa;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 状態 */
.start {
  background: #ff4444;
}

.passed {
  background: rgba(255,255,0,0.2);
}

.current {
  background: #00ffff;
  color: black;
  transform: scale(1.3);
  box-shadow: 0 0 12px cyan;
  z-index: 2;
}

.final {
  background: gold;
  color: black;
  transform: scale(1.25);
  box-shadow: 0 0 12px gold;
}

/* 軸ハイライト */
.axis-v {
  background: rgba(0,150,255,0.4);
}

.axis-h {
  background: rgba(0,255,150,0.4);
}
</style>
</head>

<body>

<h2>異世界転生数秘術</h2>

<input type="date" id="birthdate">
<button onclick="run()">占う</button>

<div id="result"></div>
<div id="grid"></div>

<script>

// ===== グリッド =====
const gridData = [
  [94,40,85,31,76,22,67,13,58,4,49],
  [39,84,30,75,21,66,12,57,3,48,93],
  [83,29,74,20,65,11,56,2,47,92,38],
  [28,73,19,64,10,55,1,46,91,37,82],
  [72,18,63,9,54,99,45,90,36,81,27],
  [17,62,8,53,98,44,89,35,80,26,71],
  [61,7,52,97,43,88,34,79,25,70,16],
  [6,51,96,42,87,33,78,24,69,15,60],
  [50,95,41,86,32,77,23,68,14,59,5]
];

const verticalAxis = [4,3,2,1,9,8,7,6,5];
const horizontalAxis = [6,7,8,9,10,11,1,2,3,4,5];

// ===== 計算 =====
function modFix(v,m){ return v%m===0?m:v%m; }

function calculateFortune(){
  const input=document.getElementById("birthdate").value;
  if(!input) return null;

  const [y,m,d]=input.split("-").map(Number);
  const total=y+m+d;

  return {
    vertical:modFix(total,9),
    horizontal:modFix(total,11),
    cross:modFix(total,99)
  };
}

function getDigits(){
  return document.getElementById("birthdate").value
    .replaceAll("-","")
    .split("")
    .reverse()
    .map(Number);
}

// ===== 座標 =====
function findPos(n){
  for(let y=0;y<9;y++){
    for(let x=0;x<11;x++){
      if(gridData[y][x]===n) return {x,y};
    }
  }
}

// ===== 移動 =====
function move(start,digits){
  let path=[];
  let x=start.x,y=start.y;

  path.push({x,y});

  digits.forEach((num,i)=>{
    for(let j=0;j<num;j++){
      if(i%2===0){
        x=(x+1)%11;
        y=(y-1+9)%9;
      }else{
        x=(x-1+11)%11;
        y=(y-1+9)%9;
      }
      path.push({x,y});
    }
  });

  return path;
}

// ===== 描画 =====
function createGrid(path, final, vNum, hNum, currentPos){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  // 上軸
  grid.appendChild(document.createElement("div"));
  horizontalAxis.forEach(n=>{
    let d=document.createElement("div");
    d.className="axis";
    if(n===hNum) d.classList.add("axis-h");
    d.textContent=n;
    grid.appendChild(d);
  });
  grid.appendChild(document.createElement("div"));

  for(let y=0;y<9;y++){

    // 左軸
    let l=document.createElement("div");
    l.className="axis";
    if(verticalAxis[y]===vNum) l.classList.add("axis-v");
    l.textContent=verticalAxis[y];
    grid.appendChild(l);

    for(let x=0;x<11;x++){
      let num=gridData[y][x];
      let cell=document.createElement("div");
      cell.className="cell";
      cell.textContent=num.toString().padStart(2,"0");

      if(path.some(p=>p.x===x && p.y===y)){
        cell.classList.add("passed");
      }

      if(num===99){
        cell.classList.add("start");
      }

      if(final && final.x===x && final.y===y){
        cell.classList.add("final");
      }

      if(currentPos && currentPos.x===x && currentPos.y===y){
        cell.classList.add("current");
      }

      grid.appendChild(cell);
    }

    // 右軸
    let r=document.createElement("div");
    r.className="axis";
    if(verticalAxis[y]===vNum) r.classList.add("axis-v");
    r.textContent=verticalAxis[y];
    grid.appendChild(r);
  }

  // 下軸
  grid.appendChild(document.createElement("div"));
  horizontalAxis.forEach(n=>{
    let d=document.createElement("div");
    d.className="axis";
    if(n===hNum) d.classList.add("axis-h");
    d.textContent=n;
    grid.appendChild(d);
  });
  grid.appendChild(document.createElement("div"));
}

// ===== アニメーション =====
function animate(path, final, vNum, hNum){
  let step=0;

  function loop(){
    if(step>=path.length){
      createGrid(path, final, vNum, hNum);
      return;
    }

    const currentPath=path.slice(0,step+1);
    const currentPos=path[step];

    createGrid(currentPath, null, vNum, hNum, currentPos);

    step++;
    setTimeout(loop,80);
  }

  loop();
}

// ===== 実行 =====
function run(){
  const data=calculateFortune();
  if(!data) return;

  const digits=getDigits();
  const start=findPos(99);

  const path=move(start,digits);
  const final=path[path.length-1];

  animate(path, final, data.vertical, data.horizontal);

  document.getElementById("result").innerHTML=`
    ヴァーチカル: ${data.vertical}<br>
    ホリゾンタル: ${data.horizontal}<br>
    クロス: ${data.cross}
  `;
}

// 初期表示
createGrid([], null, null, null);

</script>

</body>
</html>
