// ===== 計算 =====
function modFix(v,m){ return v%m===0?m:v%m; }

function mod11to0(v){
  const r = modFix(v,11);
  return r === 11 ? 0 : r;
}

function calculateFortune(){
  const input=document.getElementById("birthdate").value;
  if(!input) return null;
  const [y,m,d]=input.split("-").map(Number);
  const total=y+m+d;
  return {
    vertical:modFix(total,9),
    horizontal:mod11to0(total),
    cross:modFix(total,99)
  };
}

function getDigits(){
  return document.getElementById("birthdate").value
    .replaceAll("-","")
    .split("")
    .reverse()
    .map(Number);
}

function findPos(n){
  for(let y=0;y<9;y++){
    for(let x=0;x<11;x++){
      if(gridData[y][x]===n) return {x,y};
    }
  }
}

function move(start,digits){
  let path=[], x=start.x,y=start.y;
  path.push({x,y});
  digits.forEach((num,i)=>{
    for(let j=0;j<num;j++){
      if(i%2===0){
        x=(x+1)%11;
        y=(y-1+9)%9;
      }else{
        x=(x-1+11)%11;
        y=(y-1+9)%9;
      }
      path.push({x,y});
    }
  });
  return path;
}

// ===== 日運：指定日付の各桁に分解して移動（move()と同方式） =====
function getDailyDigits(year, month, day){
  const str = `${year}${String(month).padStart(2,"0")}${String(day).padStart(2,"0")}`;
  return str.split("").reverse().map(Number);
}

function moveDaily(start, digits){
  return move(start, digits);
}

// ===== グリッド描画（メイン） =====
function createGrid(path, final, vNum, hNum, currentPos){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  let currentV = currentPos ? verticalAxis[currentPos.y] : null;
  let currentH = currentPos ? horizontalAxis[currentPos.x] : null;

  grid.appendChild(document.createElement("div"));
  horizontalAxis.forEach(n=>{
    let d=document.createElement("div");
    d.className="axis";
    if(currentPos && n===currentH) d.classList.add("axis-current");
    else if(final && n===hNum) d.classList.add("final-horizontal");
    d.textContent=n;
    grid.appendChild(d);
  });
  grid.appendChild(document.createElement("div"));

  for(let y=0;y<9;y++){
    let l=document.createElement("div");
    l.className="axis";
    if(currentPos && verticalAxis[y]===currentV) l.classList.add("axis-current");
    else if(final && verticalAxis[y]===vNum) l.classList.add("final-vertical");
    l.textContent=verticalAxis[y];
    grid.appendChild(l);

    for(let x=0;x<11;x++){
      let num=gridData[y][x];
      let cell=document.createElement("div");
      cell.className="cell";
      cell.textContent=num.toString().padStart(2,"0");
      if(path.some(p=>p.x===x && p.y===y)) cell.classList.add("passed");
      if(num===99 && !currentPos) cell.classList.add("start");
      if(final && final.x===x && final.y===y) cell.classList.add("final-cross");
      if(currentPos && currentPos.x===x && currentPos.y===y) cell.classList.add("current");
      grid.appendChild(cell);
    }

    let r=document.createElement("div");
    r.className="axis";
    if(currentPos && verticalAxis[y]===currentV) r.classList.add("axis-current");
    else if(final && verticalAxis[y]===vNum) r.classList.add("final-vertical");
    r.textContent=verticalAxis[y];
    grid.appendChild(r);
  }

  grid.appendChild(document.createElement("div"));
  horizontalAxis.forEach(n=>{
    let d=document.createElement("div");
    d.className="axis";
    if(currentPos && n===currentH) d.classList.add("axis-current");
    else if(final && n===hNum) d.classList.add("final-horizontal");
    d.textContent=n;
    grid.appendChild(d);
  });
  grid.appendChild(document.createElement("div"));
}

// ===== グリッド描画（日運） =====
function createDailyGrid(mainFinal, dailyPath, dailyFinal, dailyVNum, dailyHNum, currentPos){
  const grid=document.getElementById("daily-grid");
  grid.innerHTML="";

  let currentV = currentPos ? verticalAxis[currentPos.y] : null;
  let currentH = currentPos ? horizontalAxis[currentPos.x] : null;

  grid.appendChild(document.createElement("div"));
  horizontalAxis.forEach(n=>{
    let d=document.createElement("div");
    d.className="axis";
    if(currentPos && n===currentH) d.classList.add("daily-axis-current");
    else if(dailyFinal && n===dailyHNum) d.classList.add("daily-final-horizontal");
    d.textContent=n;
    grid.appendChild(d);
  });
  grid.appendChild(document.createElement("div"));

  for(let y=0;y<9;y++){
    let l=document.createElement("div");
    l.className="axis";
    if(currentPos && verticalAxis[y]===currentV) l.classList.add("daily-axis-current");
    else if(dailyFinal && verticalAxis[y]===dailyVNum) l.classList.add("daily-final-vertical");
    l.textContent=verticalAxis[y];
    grid.appendChild(l);

    for(let x=0;x<11;x++){
      let num=gridData[y][x];
      let cell=document.createElement("div");
      cell.className="cell";
      cell.textContent=num.toString().padStart(2,"0");

      // 起点（転生後のマス）を強調 ※ゴール地点と被る場合はdaily-crossを優先
      const isMainFinal = mainFinal && mainFinal.x===x && mainFinal.y===y;
      const isDailyFinal = dailyFinal && dailyFinal.x===x && dailyFinal.y===y;

      if(isMainFinal && !currentPos && !isDailyFinal){
        cell.classList.add("daily-start");
      }

      // daily-passed はゴール地点には付けない
      if(dailyPath.some(p=>p.x===x && p.y===y) && !isDailyFinal) cell.classList.add("daily-passed");
      if(isDailyFinal && !currentPos) cell.classList.add("daily-cross");
      if(currentPos && currentPos.x===x && currentPos.y===y) cell.classList.add("daily-current");

      grid.appendChild(cell);
    }

    let r=document.createElement("div");
    r.className="axis";
    if(currentPos && verticalAxis[y]===currentV) r.classList.add("daily-axis-current");
    else if(dailyFinal && verticalAxis[y]===dailyVNum) r.classList.add("daily-final-vertical");
    r.textContent=verticalAxis[y];
    grid.appendChild(r);
  }

  grid.appendChild(document.createElement("div"));
  horizontalAxis.forEach(n=>{
    let d=document.createElement("div");
    d.className="axis";
    if(currentPos && n===currentH) d.classList.add("daily-axis-current");
    else if(dailyFinal && n===dailyHNum) d.classList.add("daily-final-horizontal");
    d.textContent=n;
    grid.appendChild(d);
  });
  grid.appendChild(document.createElement("div"));
}

// ===== アニメ（メイン） =====
function animate(path, final, vNum, hNum, onComplete){
  let step=0;
  function loop(){
    if(step>=path.length){
      createGrid(path, null, vNum, hNum, final);
      setTimeout(()=>{
        createGrid(path, final, vNum, hNum);
        setTimeout(onComplete,300);
      },300);
      return;
    }
    createGrid(path.slice(0,step+1), null, vNum, hNum, path[step]);
    step++;
    setTimeout(loop,90);
  }
  loop();
}

// ===== アニメ（日運） =====
function animateDaily(mainFinal, dailyPath, dailyFinal, dailyVNum, dailyHNum, onComplete){
  let step=0;
  function loop(){
    if(step>=dailyPath.length){
      createDailyGrid(mainFinal, dailyPath, null, dailyVNum, dailyHNum, dailyFinal);
      setTimeout(()=>{
        createDailyGrid(mainFinal, dailyPath, dailyFinal, dailyVNum, dailyHNum);
        setTimeout(onComplete,300);
      },300);
      return;
    }
    createDailyGrid(mainFinal, dailyPath.slice(0,step+1), null, dailyVNum, dailyHNum, dailyPath[step]);
    step++;
    setTimeout(loop,90);
  }
  loop();
}

// ===== 日運実行 =====
function runDaily(){
  if(!lastMainFinal) return;

  const data = calculateFortune();
  if(!data) return;

  const today = new Date();
  const year  = today.getFullYear();
  const month = today.getMonth() + 1;
  const day   = today.getDate();

  const total = year + month + day;
  const dailyNum = modFix(data.cross + total, 99);

  const dailyDigits = getDailyDigits(year, month, day);
  const dailyPath = moveDaily(lastMainFinal, dailyDigits);
  const dailyFinal = dailyPath[dailyPath.length - 1];

  const dailyVNum = verticalAxis[dailyFinal.y];
  const dailyHNum = horizontalAxis[dailyFinal.x];

  const msg = getDailyMessage(dailyNum);

  // ① 日運エリアを表示
  const dailyArea = document.getElementById("daily-area");
  dailyArea.style.display = "block";

  const dailyResultEl = document.getElementById("daily-result");
  dailyResultEl.classList.remove("show");
  dailyResultEl.innerHTML = "";

  // ② スタート状態のグリッドを先に描画してページ高さを確保
  createDailyGrid(lastMainFinal, [lastMainFinal], null, dailyVNum, dailyHNum, lastMainFinal);

  // ③ 1フレーム待ってレイアウト確定後にスクロール
  requestAnimationFrame(()=>{
    dailyArea.scrollIntoView({ behavior: "smooth", block: "start" });

    // ④ スクロール完了を待ってからアニメーション開始
    setTimeout(()=>{
      animateDaily(lastMainFinal, dailyPath, dailyFinal, dailyVNum, dailyHNum, ()=>{
        const text =
`ヴァーチカルナンバー ${dailyVNum}
ホリゾンタルナンバー ${dailyHNum}
クロスナンバー ${dailyNum}

${msg}`;

        dailyResultEl.innerHTML = text.replace(/\n/g,"<br>");

        lastDailyResultText = buildDailyShareText(dailyNum, msg, dailyVNum, dailyHNum);
        document.getElementById("dailyShareBtn").style.display = "inline-block";
        document.getElementById("dailyDiscordInfo").style.display = "block";
        document.getElementById("dailyDiscordBtn").style.display = "inline-block";
        requestAnimationFrame(()=>{
          dailyResultEl.scrollIntoView({ behavior: "smooth", block: "center" });
          setTimeout(()=>{ dailyResultEl.classList.add("show"); }, 300);
        });
      });
    }, 800);
  });
}
