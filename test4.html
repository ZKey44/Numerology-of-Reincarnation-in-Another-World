  justify-content: center;

}

@keyframes startGlow {

}

.passed {

<script>


// ===== ローカルストレージ =====
const STORAGE_KEY = "numerology_save";

function saveToStorage(data){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) { console.warn("storage save failed", e); }
}

function loadFromStorage(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function resetStorage(){
  localStorage.removeItem(STORAGE_KEY);
  // 画面リセット
  lastMainFinal = null;
  lastYearlyFinal = null;
  document.getElementById("grid").innerHTML = "";
  document.getElementById("result").innerHTML = "";
  document.getElementById("result").classList.remove("show");
  document.getElementById("yearly-area").style.display = "none";
  document.getElementById("yearly-result").innerHTML = "";
  document.getElementById("yearly-result").classList.remove("show");
  document.getElementById("shareBtn").style.display = "none";
  document.getElementById("yearlyBtn").style.display = "none";
  document.getElementById("discordInfo").style.display = "none";
  document.getElementById("discordBtn").style.display = "none";
  document.getElementById("resetBtn").style.display = "none";
  document.getElementById("birthdate").value = "";
  // 初期グリッド再表示
  const startPos = findPos(99);
  createGrid([], null, 9, 11, startPos);
  alert("計算結果をリセットしました。");
}

function restoreFromStorage(){
  const saved = loadFromStorage();
  if(!saved) return;

  // 生年月日を復元
  if(saved.birthdate){
    document.getElementById("birthdate").value = saved.birthdate;
  }

  // 生年月日の計算結果を復元
  if(saved.mainFinal){
    lastMainFinal = saved.mainFinal;
    const data = calculateFortune();
    if(!data) return;

    const path = move(findPos(99), getDigits());
    const final = path[path.length - 1];
    createGrid(path, final, data.vertical, data.horizontal);

    const resultEl = document.getElementById("result");
    const text =
`異界「セフィロト」に転生したもう一人のあなたは――

ヴァーチカルナンバー${data.vertical}の加護により、
「${verticalMap[data.vertical]}」の才を宿す
${verticalDesc[data.vertical]}

ホリゾンタルナンバー${data.horizontal}の導きにより、
「${horizontalMap[data.horizontal]}」に降り立つ
${horizontalDesc[data.horizontal]}

そして――
クロスナンバー${data.cross}の発現により、
固有能力：「${getCrossAbility(data.cross).title}」が目覚める。
${getCrossAbility(data.cross).body}`;
    resultEl.innerHTML = text.replace(/\n/g,"<br>");
    resultEl.classList.add("show");

    document.getElementById("shareBtn").style.display = "inline-block";
    document.getElementById("yearlyBtn").style.display = "inline-block";
    document.getElementById("discordInfo").style.display = "block";
    document.getElementById("discordBtn").style.display = "inline-block";
    document.getElementById("resetBtn").style.display = "inline-block";
  }

  // 年運の計算結果を復元
  if(saved.yearlyFinal){
    lastYearlyFinal = saved.yearlyFinal;
    const today = new Date();
    const year = today.getFullYear();
    const yearDigits = String(year).split("").reverse().map(Number);
    const yearlyPath = move(lastMainFinal, yearDigits);
    const yearlyFinal = yearlyPath[yearlyPath.length - 1];
    const yearlyVNum = verticalAxis[yearlyFinal.y];
    const yearlyHNum = horizontalAxis[yearlyFinal.x];

    const data = calculateFortune();
    if(!data) return;
    const yearlyNum = modFix(data.cross + year, 99);
    const msg = getYearlyMessage(yearlyNum);

    const startVNum = verticalAxis[lastMainFinal.y];
    const startHNum = horizontalAxis[lastMainFinal.x];
    createYearlyGrid(lastMainFinal, yearlyPath, yearlyFinal, yearlyVNum, yearlyHNum, null, startVNum, startHNum);

    const yearlyArea = document.getElementById("yearly-area");
    yearlyArea.style.display = "block";

    const yearlyResultEl = document.getElementById("yearly-result");
    const text =
`ヴァーチカルナンバー ${yearlyVNum}
ホリゾンタルナンバー ${yearlyHNum}
クロスナンバー ${yearlyNum}

${year}年

${msg}`;
    yearlyResultEl.innerHTML = text.replace(/\n/g,"<br>");
    yearlyResultEl.classList.add("show");
    document.getElementById("yearlyShareBtn").style.display = "inline-block";
    document.getElementById("yearlyDiscordInfo").style.display = "block";
    document.getElementById("yearlyDiscordBtn").style.display = "inline-block";
  }
}

// ===== 計算 =====
function modFix(v,m){ return v%m===0?m:v%m; }

function mod11to0(v){
  const r = modFix(v,11);
  return r === 11 ? 0 : r;
}

function calculateFortune(){
  const input=document.getElementById("birthdate").value;
  if(!input) return null;
  const [y,m,d]=input.split("-").map(Number);
  const total=y+m+d;
  return {
    vertical:modFix(total,9),
    horizontal:mod11to0(total),
    cross:modFix(total,99)
  };
}

function getDigits(){
  return document.getElementById("birthdate").value
    .replaceAll("-","")
    .split("")
    .reverse()
    .map(Number);
}

function findPos(n){
  for(let y=0;y<9;y++){
    for(let x=0;x<11;x++){
      if(gridData[y][x]===n) return {x,y};
    }
  }
}

function move(start,digits){
  let path=[], x=start.x,y=start.y;
  path.push({x,y});
  digits.forEach((num,i)=>{
    for(let j=0;j<num;j++){
      if(i%2===0){
        x=(x+1)%11;
        y=(y-1+9)%9;
      }else{
        x=(x-1+11)%11;
        y=(y-1+9)%9;
      }
      path.push({x,y});
    }
  });
  return path;
}

// ===== 日運：指定日付の各桁に分解して移動（move()と同方式） =====
function getDailyDigits(year, month, day){
  const str = `${year}${String(month).padStart(2,"0")}${String(day).padStart(2,"0")}`;
  return str.split("").reverse().map(Number);
}

function moveDaily(start, digits){
  return move(start, digits);
}

function createGrid(path, final, vNum, hNum, currentPos){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  let currentV = currentPos ? verticalAxis[currentPos.y] : null;
  let currentH = currentPos ? horizontalAxis[currentPos.x] : null;

  grid.appendChild(document.createElement("div"));
  horizontalAxis.forEach(n=>{
    let d=document.createElement("div");
    d.className="axis";
    if(currentPos && n===currentH) d.classList.add("axis-current");
    else if(final && n===hNum) d.classList.add("final-horizontal");
    d.textContent=n;
    grid.appendChild(d);
  });
  grid.appendChild(document.createElement("div"));

  for(let y=0;y<9;y++){
    let l=document.createElement("div");
    l.className="axis";
    if(currentPos && verticalAxis[y]===currentV) l.classList.add("axis-current");
    else if(final && verticalAxis[y]===vNum) l.classList.add("final-vertical");
    l.textContent=verticalAxis[y];
    grid.appendChild(l);

    for(let x=0;x<11;x++){
      let num=gridData[y][x];
      let cell=document.createElement("div");
      cell.className="cell";
      cell.textContent=num.toString().padStart(2,"0");
      if(path.some(p=>p.x===x && p.y===y)) cell.classList.add("passed");
      if(num===99 && !currentPos) cell.classList.add("start");
      if(final && final.x===x && final.y===y) cell.classList.add("final-cross");
      if(currentPos && currentPos.x===x && currentPos.y===y) cell.classList.add("current");
      grid.appendChild(cell);
    }

    let r=document.createElement("div");
    r.className="axis";
    if(currentPos && verticalAxis[y]===currentV) r.classList.add("axis-current");
    else if(final && verticalAxis[y]===vNum) r.classList.add("final-vertical");
    r.textContent=verticalAxis[y];
    grid.appendChild(r);
  }

  grid.appendChild(document.createElement("div"));
  horizontalAxis.forEach(n=>{
    let d=document.createElement("div");
    d.className="axis";
    if(currentPos && n===currentH) d.classList.add("axis-current");
    else if(final && n===hNum) d.classList.add("final-horizontal");
    d.textContent=n;
    grid.appendChild(d);
  });
  grid.appendChild(document.createElement("div"));
}

function createDailyGrid(mainFinal, dailyPath, dailyFinal, dailyVNum, dailyHNum, currentPos, startVNum, startHNum){
  const grid=document.getElementById("daily-grid");
  grid.innerHTML="";

  let currentV = currentPos ? verticalAxis[currentPos.y] : null;
  let currentH = currentPos ? horizontalAxis[currentPos.x] : null;

  // 軸の色判定:
  // 移動中(currentPos あり) → オレンジ(daily-axis-current)
  // 開始前・到達前(currentPos なし & dailyFinal なし) → オレンジ(daily-final-horizontal/vertical)
  // 到達後(currentPos なし & dailyFinal あり) → 青・緑(final-vertical/final-horizontal)
  const isFinished = !currentPos && dailyFinal !== null;
  // 軸表示に使うV/H:
  // 計算中(currentPos あり) → currentPos のV/H
  // 計算前(currentPos なし & dailyFinal なし) → スタートのV/H
  // 計算後(currentPos なし & dailyFinal あり) → ゴールのV/H
  const axisVNum = currentPos ? currentV : (isFinished ? dailyVNum : (startVNum ?? dailyVNum));
  const axisHNum = currentPos ? currentH : (isFinished ? dailyHNum : (startHNum ?? dailyHNum));

  grid.appendChild(document.createElement("div"));
  horizontalAxis.forEach(n=>{
    let d=document.createElement("div");
    d.className="axis";
    if(currentPos && n===currentH) d.classList.add("daily-axis-current");
    else if(n===axisHNum){
      d.classList.add(isFinished ? "final-horizontal" : "daily-final-horizontal");
    }
    d.textContent=n;
    grid.appendChild(d);
  });
  grid.appendChild(document.createElement("div"));

  for(let y=0;y<9;y++){
    let l=document.createElement("div");
    l.className="axis";
    if(currentPos && verticalAxis[y]===currentV) l.classList.add("daily-axis-current");
    else if(verticalAxis[y]===axisVNum){
      l.classList.add(isFinished ? "final-vertical" : "daily-final-vertical");
    }
    l.textContent=verticalAxis[y];
    grid.appendChild(l);

    for(let x=0;x<11;x++){
      let num=gridData[y][x];
      let cell=document.createElement("div");
      cell.className="cell";
      cell.textContent=num.toString().padStart(2,"0");

      const isMainFinal = mainFinal && mainFinal.x===x && mainFinal.y===y;
      const isDailyFinal = dailyFinal && dailyFinal.x===x && dailyFinal.y===y;

      if(isMainFinal && !isDailyFinal && !currentPos){
        cell.classList.add(isFinished ? "daily-start-finished" : "daily-start");
      }

      if(dailyPath.some(p=>p.x===x && p.y===y) && !isDailyFinal) cell.classList.add("daily-passed");
      if(isDailyFinal && !currentPos) cell.classList.add("daily-cross");
      if(currentPos && currentPos.x===x && currentPos.y===y) cell.classList.add("daily-current");

      grid.appendChild(cell);
    }

    let r=document.createElement("div");
    r.className="axis";
    if(currentPos && verticalAxis[y]===currentV) r.classList.add("daily-axis-current");
    else if(verticalAxis[y]===axisVNum){
      r.classList.add(isFinished ? "final-vertical" : "daily-final-vertical");
    }
    r.textContent=verticalAxis[y];
    grid.appendChild(r);
  }

  grid.appendChild(document.createElement("div"));
  horizontalAxis.forEach(n=>{
    let d=document.createElement("div");
    d.className="axis";
    if(currentPos && n===currentH) d.classList.add("daily-axis-current");
    else if(n===axisHNum){
      d.classList.add(isFinished ? "final-horizontal" : "daily-final-horizontal");
    }
    d.textContent=n;
    grid.appendChild(d);
  });
  grid.appendChild(document.createElement("div"));
}

// ===== アニメ（メイン） =====
function animate(path, final, vNum, hNum, onComplete){
  let step=0;
  function loop(){
    if(step>=path.length){
      createGrid(path, null, vNum, hNum, final);
      setTimeout(()=>{
        createGrid(path, final, vNum, hNum);
        setTimeout(onComplete,300);
      },300);
      return;
    }
    createGrid(path.slice(0,step+1), null, vNum, hNum, path[step]);
    step++;
    setTimeout(loop,90);
  }
  loop();
}

}

  lastYearlyFinal = yearlyFinal;

  const yearlyVNum = verticalAxis[yearlyFinal.y];
  const yearlyHNum = horizontalAxis[yearlyFinal.x];

  // クロスナンバー計算
  const data = calculateFortune();
  if(!data) return;
  const yearlyNum = modFix(data.cross + year, 99);
  const msg = getYearlyMessage(yearlyNum);

  const yearlyArea = document.getElementById("yearly-area");
  yearlyArea.style.display = "block";

  const yearlyResultEl = document.getElementById("yearly-result");
  yearlyResultEl.classList.remove("show");
  yearlyResultEl.innerHTML = "";

  const startVNum = verticalAxis[lastMainFinal.y];
  const startHNum = horizontalAxis[lastMainFinal.x];
  createYearlyGrid(lastMainFinal, [], null, yearlyVNum, yearlyHNum, null, startVNum, startHNum);

  requestAnimationFrame(()=>{
    yearlyArea.scrollIntoView({ behavior: "smooth", block: "start" });
    setTimeout(()=>{
      animateYearly(lastMainFinal, yearlyPath, yearlyFinal, yearlyVNum, yearlyHNum, ()=>{
        const text =
`ヴァーチカルナンバー ${yearlyVNum}
ホリゾンタルナンバー ${yearlyHNum}
クロスナンバー ${yearlyNum}

${year}年

${msg}`;

        yearlyResultEl.innerHTML = text.replace(/\n/g,"<br>");
        lastYearlyResultText = buildYearlyShareText(yearlyNum, msg, year);
        document.getElementById("yearlyShareBtn").style.display = "inline-block";
        document.getElementById("yearlyDiscordInfo").style.display = "block";
        document.getElementById("yearlyDiscordBtn").style.display = "inline-block";
        // ストレージ保存
        const saved = loadFromStorage() || {};
        saved.yearlyFinal = yearlyFinal;
        saved.yearlyHNum = yearlyHNum;
        saveToStorage(saved);
        requestAnimationFrame(()=>{
          yearlyResultEl.scrollIntoView({ behavior: "smooth", block: "center" });
          setTimeout(()=>{ yearlyResultEl.classList.add("show"); }, 300);
        });
      });
    }, 800);
  });
}

// ===== 日運実行 =====
function runDaily(){
  if(!lastMainFinal) return;

  const data = calculateFortune();
  if(!data) return;

  const today = new Date();
  const year  = today.getFullYear();
  const month = today.getMonth() + 1;
  const day   = today.getDate();

  const total = year + month + day;
  const dailyNum = modFix(data.cross + total, 99);

  const dailyDigits = getDailyDigits(year, month, day);
  const dailyPath = moveDaily(lastMainFinal, dailyDigits);
  const dailyFinal = dailyPath[dailyPath.length - 1];

  const dailyVNum = verticalAxis[dailyFinal.y];
  const dailyHNum = horizontalAxis[dailyFinal.x];

  const msg = getDailyMessage(dailyNum);

  // ① 日運エリアを表示
  const dailyArea = document.getElementById("daily-area");
  dailyArea.style.display = "block";

  const dailyResultEl = document.getElementById("daily-result");
  dailyResultEl.classList.remove("show");
  dailyResultEl.innerHTML = "";

  // ② スタート状態のグリッドを先に描画してページ高さを確保（拡大なし）
  const startVNum = verticalAxis[lastMainFinal.y];
  const startHNum = horizontalAxis[lastMainFinal.x];
  createDailyGrid(lastMainFinal, [], null, dailyVNum, dailyHNum, null, startVNum, startHNum);

  // ③ 1フレーム待ってレイアウト確定後にスクロール
  requestAnimationFrame(()=>{
    dailyArea.scrollIntoView({ behavior: "smooth", block: "start" });

    // ④ スクロール完了を待ってからアニメーション開始
    setTimeout(()=>{
      animateDaily(lastMainFinal, dailyPath, dailyFinal, dailyVNum, dailyHNum, ()=>{
        const dateStr = `${year}年${month}月${day}日`;
        // 年運Hをストレージから取得
        const savedData = loadFromStorage();
        const yearlyHNum = savedData && savedData.yearlyHNum !== undefined ? savedData.yearlyHNum : null;
        const yearlyStage = yearlyHNum !== null ? `今年の舞台：${horizontalMap[yearlyHNum]}` : "";
        const text =
`${yearlyStage}

${dateStr}

V ${dailyVNum} / H ${dailyHNum} / X ${dailyNum}

${msg}`;

        dailyResultEl.innerHTML = text.replace(/\n/g,"<br>");

        lastDailyResultText = buildDailyShareText(dailyNum, msg, dailyVNum, dailyHNum);
        document.getElementById("dailyShareBtn").style.display = "inline-block";
        document.getElementById("dailyDiscordInfo").style.display = "block";
        document.getElementById("dailyDiscordBtn").style.display = "inline-block";
        requestAnimationFrame(()=>{
          dailyResultEl.scrollIntoView({ behavior: "smooth", block: "center" });
          setTimeout(()=>{ dailyResultEl.classList.add("show"); }, 300);
        });
      });
    }, 800);
  });
}
